<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p>Enter numbers and click ok</p>
    <input id="id" type="number" min="100" max="300" required> 
    <button onclick="purple()">ok</button>
    <p id="pink"></p>
    <script>
        function purple(){
            var a=document.getElementById("id");
            if(!a.checkValidity())
        {document.getElementById("pink").innerHTML=a.validationMessage;} 
        else{
            document.getElementById("pink").innerHTML="inputok";
        }
        }

    </script>
</body>
</html>
